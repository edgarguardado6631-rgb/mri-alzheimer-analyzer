<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <!-- Icon (scaled down, centered vertically) -->
  <g transform="translate(8, 8) scale(0.64)">
    <!-- Background -->
    <rect width="100" height="100" rx="18" fill="#161616"/>
    <!-- MRI scanner ring -->
    <circle cx="50" cy="50" r="40" fill="none" stroke="#0f62fe" stroke-width="2"/>
    <line x1="50" y1="10" x2="50" y2="16" stroke="#0f62fe" stroke-width="2"/>
    <line x1="50" y1="84" x2="50" y2="90" stroke="#0f62fe" stroke-width="2"/>
    <line x1="10" y1="50" x2="16" y2="50" stroke="#0f62fe" stroke-width="2"/>
    <line x1="84" y1="50" x2="90" y2="50" stroke="#0f62fe" stroke-width="2"/>
    <!-- Brain left -->
    <path d="M50,22 C44,22 35,24 30,32 C25,40 25,52 30,60 C34,67 42,70 50,70"
          fill="none" stroke="#0f62fe" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Brain right -->
    <path d="M50,22 C56,22 65,24 70,32 C75,40 75,52 70,60 C66,67 58,70 50,70"
          fill="none" stroke="#0f62fe" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="22" x2="50" y2="70" stroke="#0f62fe" stroke-width="1.5" opacity="0.5"/>
    <path d="M44,70 Q50,78 56,70" fill="none" stroke="#0f62fe" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Nodes -->
    <circle cx="36" cy="36" r="3.5" fill="#78a9ff"/>
    <circle cx="50" cy="30" r="3.5" fill="#ffffff"/>
    <circle cx="64" cy="36" r="3.5" fill="#78a9ff"/>
    <circle cx="50" cy="50" r="4" fill="#0f62fe"/>
    <circle cx="40" cy="63" r="3" fill="#78a9ff"/>
    <circle cx="60" cy="63" r="3" fill="#78a9ff"/>
    <!-- Connections -->
    <line x1="36" y1="36" x2="50" y2="30" stroke="#78a9ff" stroke-width="1" opacity="0.7"/>
    <line x1="50" y1="30" x2="64" y2="36" stroke="#78a9ff" stroke-width="1" opacity="0.7"/>
    <line x1="36" y1="36" x2="50" y2="50" stroke="#78a9ff" stroke-width="1" opacity="0.7"/>
    <line x1="64" y1="36" x2="50" y2="50" stroke="#78a9ff" stroke-width="1" opacity="0.7"/>
    <line x1="50" y1="50" x2="40" y2="63" stroke="#78a9ff" stroke-width="1" opacity="0.7"/>
    <line x1="50" y1="50" x2="60" y2="63" stroke="#78a9ff" stroke-width="1" opacity="0.7"/>
    <!-- Scan line -->
    <line x1="18" y1="50" x2="82" y2="50" stroke="#0f62fe" stroke-width="1" opacity="0.35" stroke-dasharray="5,3"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="32" font-family="IBM Plex Sans, Helvetica Neue, Arial, sans-serif"
        font-size="22" font-weight="600" fill="#161616" letter-spacing="-0.3">Neuro</text>
  <text x="82" y="32" font-family="IBM Plex Sans, Helvetica Neue, Arial, sans-serif"
        font-size="22" font-weight="300" fill="#161616" letter-spacing="-0.3" dx="65">Scan</text>

  <!-- AI badge -->
  <rect x="82" y="42" width="26" height="16" rx="2" fill="#0f62fe"/>
  <text x="95" y="54" font-family="IBM Plex Sans, Helvetica Neue, Arial, sans-serif"
        font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">AI</text>

  <!-- Tagline -->
  <text x="82" y="70" font-family="IBM Plex Sans, Helvetica Neue, Arial, sans-serif"
        font-size="11" font-weight="400" fill="#6f6f6f" letter-spacing="0.5">MRI Analysis &amp; Alzheimer Detection</text>
</svg>
