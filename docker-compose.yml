version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ml/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./ml:/app
      - ./data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
