version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ml/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./ml:/app
      - ./data:/data
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
